<!DOCTYPE html>
<html>
<head>
    <title>Simple Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>My Online Store</h1>
</header>

<section class="products">

<div class="product">
    <h3>T-Shirt</h3>
    <p>Price: ₹500</p>
    <button onclick="addToCart('T-Shirt')">Add to Cart</button>
</div>

<div class="product">
    <h3>Shoes</h3>
    <p>Price: ₹1500</p>
    <button onclick="addToCart('Shoes')">Add to Cart</button>
</div>

<div class="product">
    <h3>Watch</h3>
    <p>Price: ₹2000</p>
    <button onclick="addToCart('Watch')">Add to Cart</button>
</div>

</section>

<h2>Cart</h2>
<ul id="cart"></ul>

<script src="script.js"></script>

</body>
</html>
